<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dark-mode - RTL Dashboard Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link id="bootstrapCss" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
  <link rel="stylesheet" href="./css/Theme.css">
  <link rel="stylesheet" href="./css/Style.css">
</head>
<body>
  <div class="layout-shell">
    <aside id="appSidebar" class="sidebar-original">
      <div class="sidebar-brand">
        <img class="brand-logo" src="./svg/logo.svg" alt="App logo">
        <strong>لوحة المشاريع</strong>
      </div>
      <p class="side-comment">القائمة السريعة</p>
      <ul class="side-list">
        <li class="side-item "><a href="./index.html">Dashboard</a></li>
        <li class="side-item "><a href="./widget.html">Widget</a></li>
        <li class="side-item "><a href="./modal.html">Modal</a></li>
        <li class="side-item "><a href="./toast.html">Toast</a></li>
        <li class="side-item "><a href="./Chart.html">Chart</a></li>
      </ul>
      <p class="side-comment">اللغة</p>
      <select class="form-select mb-2" id="mobileLocale"><option value="ar">العربية (RTL)</option><option value="en">English (LTR)</option></select>
      <button id="mobileThemeToggle" class="btn btn-outline-secondary w-100">🌙 Dark</button>
    </aside>

    <div class="content-shell">
      <header class="topbar-original">
        <button id="sidebarToggle" class="btn btn-light" type="button">☰</button>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <select class="form-select" id="localeSelect" aria-label="Language"><option value="ar">العربية (RTL)</option><option value="en">English (LTR)</option></select>
          <button id="themeToggle" class="btn btn-outline-secondary">🌙 Dark</button>
        </div>
      </header>

      <main class="content-main">
        <div class="card p-4">
          <h1 class="h4 mb-2">dark-mode</h1>
          <p class="text-muted mb-3">تم تحويل هذه الصفحة إلى الثيم الجديد مع نفس الناف والسايد بار.</p>
          <a href="./index.html" class="btn btn-theme">العودة للوحة الرئيسية</a>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
